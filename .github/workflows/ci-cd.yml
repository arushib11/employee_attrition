name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Run tests
      run: |
        PYTHONPATH=$PWD/src pytest tests/ -v --tb=short
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
#    - name: Upload coverage to Codecov
#      uses: codecov/codecov-action@v4
#      with:
#        file: ./coverage.xml
#        token: ${{ secrets.CODECOV_TOKEN }} # Required for v4+


  train:
    runs-on: ubuntu-latest
    needs: test  # Training only runs if tests pass

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Set up DVC
      run: dvc pull || echo "⚠️ DVC pull failed, using local data if available"
    - name: Train and Validate Model
      run: |
        # Ensure data exists before running script to avoid 255 crash
        if [ ! -f "data/employee_attrition.csv" ]; then
          echo "❌ Error: Dataset data/employee_attrition.csv not found."
          echo "Make sure data is committed to Git or DVC remote is configured."
          exit 1
        fi
        
        PYTHONPATH=$PWD/src python src/train.py