name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Run tests
      run: |
        PYTHONPATH=$PWD/src pytest tests/ -v --tb=short
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
#    - name: Upload coverage to Codecov
#      uses: codecov/codecov-action@v4
#      with:
#        file: ./coverage.xml
#        token: ${{ secrets.CODECOV_TOKEN }} # Required for v4+


  train:
    runs-on: ubuntu-latest
    needs: test  # Training only runs if tests pass

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Set up DVC
      run: dvc pull || echo "⚠️ DVC pull failed, using local data if available"
    - name: Ensure training dataset
      run: |
        # CSV is gitignored and tracked by DVC; the default remote is a local path,
        # so `dvc pull` usually cannot restore data in GitHub Actions. Fetch the
        # same IBM HR Attrition dataset when the file is still missing.
        if [ ! -f "data/employee_attrition.csv" ]; then
          echo "Dataset missing after DVC pull; downloading IBM HR Attrition CSV..."
          mkdir -p data
          curl -fsSL -o data/employee_attrition.csv \
            "https://raw.githubusercontent.com/IBM/employee-attrition-aif360/master/data/emp_attrition.csv"
        fi
        test -f "data/employee_attrition.csv"
    - name: Train and Validate Model
      run: |
        PYTHONPATH=$PWD/src python src/train.py