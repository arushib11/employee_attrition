name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Run tests
      run: |
        pytest tests/ --cov=src --cov-report=xml
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml

  train:
    runs-on: ubuntu-latest
    needs: test  # Training only runs if tests pass

    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Set up DVC
      run: |
        pip install dvc
        dvc pull  # Get the dataset
    - name: Train model
      run: |
        python src/train.py
    - name: Validate model performance
      run: |
        # Check if training succeeded and model met thresholds
        if [ $? -eq 0 ]; then
          echo "✅ Model training and validation successful"
        else
          echo "❌ Model validation failed - performance below threshold"
          exit 1
        fi